name: Fetch Patreon Posts

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger from Actions tab
  workflow_dispatch:

  # Run on push to main (for testing; remove if not needed)
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  fetch-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install jimp

      - name: Fetch Patreon Posts
        env:
          PATREON_ACCESS_TOKEN: ${{ secrets.PATREON_ACCESS_TOKEN }}
          PATREON_CAMPAIGN_ID: ${{ secrets.PATREON_CAMPAIGN_ID }}
        run: |
          node fetch-patreon.js

      - name: Commit and Push if changed
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add patreon-posts.json patreon/posts/
          if ! git diff --cached --quiet; then
            git commit -m "Update Patreon posts and thumbnails [skip ci]"
            git push origin main
          else
            echo "No changes to patreon-posts.json or thumbnails; skipping commit/push."
          fi
